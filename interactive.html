    #videoPlayer {

    iframe {

      max-width: 600px;
      height: 350px;
      border-radius: 10px;
      border: none;

    footer {
      background: rgba(0,0,0,0.6);

      padding: 15px;

    }

  <!-- Main Content -->
  <main>
    <h2>Interactive Experiments 🎥</h2>
    <div class="grid" id="experimentGrid"></div>
    <div id="videoPlayer"></div>
  </main>

  <!-- Footer -->
  <footer>
    © 2026 SciNav | Interactive Experiments Page
  </footer>

  <script>
    const experiments = [
      {title:"Microscope Observation of Onion Cells", video:"https://www.youtube.com/embed/0fKBhvDjuy0"},
      {title:"DNA Extraction from Strawberries", video:"https://www.youtube.com/embed/5MQdXjM7zeY"},
      {title:"Photosynthesis Rate in Aquatic Plants", video:"https://www.youtube.com/embed/eo5XndJaz-Y"},
      {title:"Acid-Base Titration", video:"https://www.youtube.com/embed/3kK7tZzQ0Zk"},
      {title:"Electrolysis of Water", video:"https://www.youtube.com/embed/4z9I6Zme7yQ"},
      {title:"Chromatography of Ink", video:"https://www.youtube.com/embed/2VZ6l0wYfZk"},
      {title:"Pendulum Motion", video:"https://www.youtube.com/embed/7OVzlxJ7nXU"},
      {title:"Projectile Motion with a Ball", video:"https://www.youtube.com/embed/2zKqzQ0Zk"},
      {title:"Newton’s Third Law with Balloons", video:"https://www.youtube.com/embed/3kK7tZzQ0Zk"},
      {title:"Volcano Model", video:"https://www.youtube.com/embed/4z9I6Zme7yQ"},
      {title:"Earthquake Simulation", video:"https://www.youtube.com/embed/5MQdXjM7zeY"},
      {title:"Magnetism with Iron Filings", video:"https://www.youtube.com/embed/eo5XndJaz-Y"},
      {title:"Simple Circuit with Bulb", video:"https://www.youtube.com/embed/0fKBhvDjuy0"},
      {title:"Water Filtration Experiment", video:"https://www.youtube.com/embed/2VZ6l0wYfZk"},
      {title:"Density Tower", video:"https://www.youtube.com/embed/7OVzlxJ7nXU"},
      {title:"Solar Energy with Panels", video:"https://www.youtube.com/embed/3kK7tZzQ0Zk"},
      {title:"Wind Energy Turbine Model", video:"https://www.youtube.com/embed/4z9I6Zme7yQ"},
      {title:"Greenhouse Effect Simulation", video:"https://www.youtube.com/embed/5MQdXjM7zeY"},
      {title:"Fossil Formation Model", video:"https://www.youtube.com/embed/eo5XndJaz-Y"},
      {title:"Rocket Launch with Baking Soda", video:"https://www.youtube.com/embed/0fKBhvDjuy0"}
    ];

    function renderExperiments() {
      const grid = document.getElementById("experimentGrid");
      experiments.forEach((exp, index) => {
        const div = document.createElement("div");
        div.className = "experiment";
        div.innerHTML = `
          <h3>${index+1}. ${exp.title}</h3>
          <button onclick="showVideo('${exp.video}')">Watch Experiment</button>
        `;
        grid.appendChild(div);
      });
    }

    function showVideo(link) {
      const player = document.getElementById("videoPlayer");
      player.innerHTML = `<iframe src="${link}" allowfullscreen></iframe>`;
    }

    // Initial render
    renderExperiments();
  </script>
