<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SciNav | Knowledge Search</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #ffecd2, #fcb69f, #a1c4fd, #c2e9fb);
      background-size: 400% 400%;
      animation: gradientBG 20s ease infinite;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    nav {
      background: linear-gradient(90deg, #004080, #0080ff);
      padding: 12px;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 10;
    }
    nav ul {
      list-style: none;
      display: flex;
      justify-content: space-around;
    }
    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }
    nav ul li a:hover { color: #ffcc00; }

    main {
      flex: 1;
      padding: 100px 20px 40px; /* offset for fixed nav */
      text-align: center;
    }

    h2 {
      color: #00ffcc;
      margin-bottom: 20px;
      font-size: 2.2em;
      animation: fadeIn 2s ease;
    }

    .search-box {
      margin-bottom: 30px;
    }

    input[type="text"] {
      padding: 12px;
      width: 70%;
      max-width: 400px;
      border-radius: 8px;
      border: none;
      font-size: 1em;
    }

    button {
      padding: 10px 20px;
      background: #ff6600;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      margin-left: 10px;
    }
    button:hover { background: #ff3300; }

    #result {
      margin-top: 20px;
      background: rgba(0,0,0,0.6);
      padding: 15px;
      border-radius: 10px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      font-size: 1.1em;
      color: #fff;
      animation: fadeIn 1.5s ease;
    }

    /* Floating science icons */
    .icon {
      position: absolute;
      font-size: 2em;
      animation: float 15s linear infinite;
      opacity: 0.8;
    }
    .icon:nth-child(1) { left: 15%; animation-delay: 0s; }
    .icon:nth-child(2) { left: 35%; animation-delay: 3s; }
    .icon:nth-child(3) { left: 55%; animation-delay: 6s; }
    .icon:nth-child(4) { left: 75%; animation-delay: 9s; }
    .icon:nth-child(5) { left: 90%; animation-delay: 12s; }

    @keyframes float {
      0% { top: 100%; transform: rotate(0deg); }
      50% { transform: rotate(180deg); }
      100% { top: -10%; transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      background: rgba(0,0,0,0.6);
      text-align: center;
      padding: 15px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="search.html">Knowledge Search</a></li>
      <li><a href="reviewer.html">Reviewer</a></li>
      <li><a href="case-studies.html">Case Studies</a></li>
      <li><a href="interactive.html">Experiments</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main>
    <h2>Science Knowledge Search 🔎</h2>
    <div class="search-box">
      <input type="text" id="searchBox" placeholder="Type a keyword (DNA, Atom, Volcano)...">
      <button onclick="searchInfo()">Search</button>
    </div>
    <div id="result"></div>

    <!-- Animated Science Icons -->
    <div class="icon">⚛️</div>
    <div class="icon">🧬</div>
    <div class="icon">🔬</div>
    <div class="icon">⚗️</div>
    <div class="icon">🛰️</div>
  </main>

  <!-- Footer -->
  <footer>
    © 2026 SciNav | Knowledge Search Page
  </footer>

  <script>
    const explanations = {
      "DNA": "DNA (Deoxyribonucleic Acid) carries genetic instructions for life.",
      "RNA": "RNA helps translate DNA into proteins.",
      "Atom": "An atom is the smallest unit of matter.",
      "Molecule": "Two or more atoms bonded together.",
      "Cell": "Basic unit of life.",
      "Photosynthesis": "Plants convert sunlight into energy.",
      "Gravity": "Force attracting objects toward each other.",
      "Volcano": "Opening in Earth’s crust releasing lava and gases.",
      "Galaxy": "System of stars bound by gravity.",
      "Universe": "All space, time, matter, and energy."
    };

    function searchInfo() {
      const query = document.getElementById("searchBox").value.trim().toLowerCase();
      const resultDiv = document.getElementById("result");
      if (!query) {
        resultDiv.innerHTML = "Please type a keyword.";
        return;
      }
      const key = Object.keys(explanations).find(k => k.toLowerCase() === query);
      if (key) {
        resultDiv.innerHTML = `<strong>${key}:</strong> ${explanations[key]}`;
      } else {
        resultDiv.innerHTML = "No explanation found. Try keywords like DNA, Atom, Volcano, Photosynthesis, Gravity.";
      }
    }
  </script>
</body>
</html>
