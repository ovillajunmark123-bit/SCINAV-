<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SciNav | Case Studies</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #ffecd2, #fcb69f, #a1c4fd, #c2e9fb);
      background-size: 400% 400%;
      animation: gradientBG 20s ease infinite;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    nav {
      background: rgba(0,0,0,0.6);
      padding: 12px;
    }
    nav ul {
      list-style: none;
      display: flex;
      justify-content: space-around;
    }
    nav ul li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    main {
      flex: 1;
      padding: 20px;
    }

    h2 {
      text-align: center;
      color: #004080;
      margin-bottom: 20px;
    }

    input[type="text"] {
      padding: 10px;
      width: 80%;
      max-width: 400px;
      border-radius: 8px;
      border: none;
      margin: 0 auto 20px auto;
      display: block;
      font-size: 1em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .study {
      background: rgba(255,255,255,0.9);
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }
    .study:hover { transform: scale(1.05); }

    .study h3 {
      color: #ff6600;
      margin-bottom: 10px;
    }

    .study p {
      font-size: 0.95em;
      margin-bottom: 10px;
    }

    .study a {
      color: #004080;
      font-weight: bold;
      text-decoration: none;
    }

    footer {
      background: rgba(0,0,0,0.6);
      color: white;
      text-align: center;
      padding: 15px;
      font-size: 0.9em;
    }
  </style>
</head>
<body>
  <!-- Navigation Bar -->
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="search.html">Knowledge Search</a></li>
      <li><a href="reviewer.html">Reviewer</a></li>
      <li><a href="case-studies.html">Case Studies</a></li>
    </ul>
  </nav>

  <!-- Main Content -->
  <main>
    <h2>Science Case Studies 🔎</h2>
    <input type="text" id="searchBox" placeholder="Search case studies...">
    <div class="grid" id="studiesGrid"></div>
  </main>

  <!-- Footer -->
  <footer>
    © 2026 SciNav | Case Studies Page
  </footer>

  <script>
    const studies = [
      {title:"CRISPR Gene Editing", abstract:"Explores CRISPR-Cas9 technology for modifying DNA sequences.", link:"#"},
      {title:"COVID-19 Vaccine Development", abstract:"Examines rapid development of mRNA vaccines.", link:"#"},
      {title:"Stem Cell Therapy", abstract:"Investigates how stem cells regenerate damaged tissues.", link:"#"},
      {title:"Human Microbiome", abstract:"Studies the role of gut bacteria in health.", link:"#"},
      {title:"Biodiversity Loss", abstract:"Analyzes species decline due to deforestation.", link:"#"},
      {title:"Plastic Pollution", abstract:"Evaluates biodegradable plastics and their impact.", link:"#"},
      {title:"Green Chemistry", abstract:"Focuses on sustainable chemical reactions.", link:"#"},
      {title:"Nanoparticles in Drug Delivery", abstract:"Explores targeted drug delivery using nanoparticles.", link:"#"},
      {title:"Water Purification", abstract:"Investigates activated carbon for clean water.", link:"#"},
      {title:"Battery Chemistry", abstract:"Examines lithium-ion and solid-state batteries.", link:"#"},
      {title:"Gravitational Waves", abstract:"Discusses LIGO’s detection of spacetime ripples.", link:"#"},
      {title:"Quantum Computing", abstract:"Explores quantum mechanics applied to computing.", link:"#"},
      {title:"Solar Energy Efficiency", abstract:"Studies improvements in photovoltaic cells.", link:"#"},
      {title:"Projectile Motion in Sports", abstract:"Analyzes ball trajectories in basketball and soccer.", link:"#"}
    ];

    function renderStudies(list) {
      const grid = document.getElementById("studiesGrid");
      grid.innerHTML = "";
      list.forEach(study => {
        const div = document.createElement("div");
        div.className = "study";
        div.innerHTML = `
          <h3>${study.title}</h3>
          <p>${study.abstract}</p>
          <a href="${study.link}">Read More</a>
        `;
        grid.appendChild(div);
      });
    }

    function searchStudies() {
      const query = document.getElementById("searchBox").value.toLowerCase();
      const filtered = studies.filter(s => 
        s.title.toLowerCase().includes(query) || s.abstract.toLowerCase().includes(query)
      );
      renderStudies(filtered);
    }

    document.getElementById("searchBox").addEventListener("input", searchStudies);

    // Initial render
    renderStudies(studies);
  </script>
</body>
</html>
